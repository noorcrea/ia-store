# fly.toml app configuration file generated for ia-store-app on 2026-04-29T05:16:23Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ia-store-app'
primary_region = 'iad'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
